# OpenClaw Fleet
#
# Mission Control + Knowledge Graph (LightRAG) + IRC (The Lounge)
#
# Setup:
#   cp .env.example .env
#   # Edit .env — set LOCAL_AUTH_TOKEN (min 50 chars)
#   docker compose up -d --build
#   ./scripts/setup-mcp-deps.sh       # install pip-based MCP dependencies
#   ./scripts/setup-lightrag.sh       # index knowledge base into graph
#   ./scripts/setup-claude-mem.sh     # configure per-agent memory
#   ./scripts/setup-agent-tools.sh    # deploy MCP configs per agent
#   ./scripts/install-plugins.sh      # install plugins per agent
#
# Access:
#   Mission Control UI:  http://localhost:3000
#   Mission Control API: http://localhost:8000
#   LightRAG API:        http://localhost:9621
#   LightRAG WebUI:      http://localhost:9621/webui/
#   OCF Gateway:         http://localhost:9400

services:

  # --- Infrastructure ---

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mission_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Mission Control (from vendor/openclaw-mission-control) ---

  backend:
    build:
      context: ./vendor/openclaw-mission-control
      dockerfile: backend/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: ./vendor/openclaw-mission-control/backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}
      AUTH_MODE: ${AUTH_MODE:-local}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      RQ_REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./vendor/openclaw-mission-control/frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
        NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-local}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-auto}
      NEXT_PUBLIC_AUTH_MODE: ${AUTH_MODE:-local}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

  webhook-worker:
    build:
      context: ./vendor/openclaw-mission-control
      dockerfile: backend/Dockerfile
    command: ["python", "scripts/rq-docker", "worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-mission_control}
      AUTH_MODE: ${AUTH_MODE:-local}
      LOCAL_AUTH_TOKEN: ${LOCAL_AUTH_TOKEN}
      BASE_URL: ${BASE_URL:-http://localhost:8000}
      RQ_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped

  # OCF Gateway runs on the host (not in Docker)
  # It needs direct access to Claude Code CLI
  # Start it with: openclaw gateway run --port 18789

  # --- Text Embeddings (TEI — dedicated, faster than LocalAI for embeddings) ---

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command: --model-id nomic-ai/nomic-embed-text-v1.5 --port 8085
    ports:
      - "127.0.0.1:${TEI_PORT:-8085}:8085"
    volumes:
      - tei_models:/data
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cat < /dev/tcp/localhost/8085 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  # --- Knowledge Graph (LightRAG) ---

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tei:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${LIGHTRAG_PORT:-9621}:9621"
    volumes:
      - lightrag_storage:/app/data/rag_storage
      - ./data/lightrag/inputs:/app/data/inputs
    environment:
      # Server
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      HOST: "0.0.0.0"
      PORT: "9621"
      LOG_LEVEL: ${LIGHTRAG_LOG_LEVEL:-INFO}

      # LLM — uses LocalAI hermes on host (OpenAI-compatible API)
      # Timeout accounts for cold start (~80s) + inference on 7B with 32K context
      LLM_BINDING: openai
      LLM_MODEL: ${LIGHTRAG_LLM_MODEL:-hermes}
      LLM_BINDING_HOST: ${LIGHTRAG_LLM_HOST:-http://host.docker.internal:8090/v1}
      LLM_BINDING_API_KEY: ${LIGHTRAG_LLM_API_KEY:-dummy}
      LLM_TIMEOUT: ${LIGHTRAG_LLM_TIMEOUT:-600}

      # Embeddings — TEI dedicated embedding server (faster, no contention with LLM)
      EMBEDDING_BINDING: openai
      EMBEDDING_MODEL: ${LIGHTRAG_EMBEDDING_MODEL:-nomic-ai/nomic-embed-text-v1.5}
      EMBEDDING_BINDING_HOST: ${LIGHTRAG_EMBEDDING_HOST:-http://tei:8085/v1}
      EMBEDDING_BINDING_API_KEY: ${LIGHTRAG_EMBEDDING_API_KEY:-dummy}
      EMBEDDING_DIM: ${LIGHTRAG_EMBEDDING_DIM:-768}

      # ── Entity extraction ──
      ENTITY_TYPES: '["system","agent","tool","hook","skill","plugin"]'
      # Chunk size 1000 — big enough for entity pairs to appear together (relationships)
      # Too small (600) = entities split across chunks = 0 relationships
      CHUNK_SIZE: "1000"
      CHUNK_OVERLAP_SIZE: "100"
      # Gleaning: re-prompt for missed entities/relations (correct env var name)
      MAX_GLEANING: "1"
      # LLM output controls — CRITICAL for relationship extraction
      # Without these, model runs out of output tokens before generating relationships
      OPENAI_LLM_MAX_TOKENS: "4096"
      OPENAI_LLM_TEMPERATURE: "0.3"
      # Guard against context overflow during gleaning
      MAX_EXTRACT_INPUT_TOKENS: "6000"
      SUMMARY_LANGUAGE: "English"

      # Storage — Redis for KV (faster, semantic caching), NetworkX for graph
      LIGHTRAG_KV_STORAGE: RedisKVStorage
      LIGHTRAG_DOC_STATUS_STORAGE: RedisDocStatusStorage
      LIGHTRAG_GRAPH_STORAGE: NetworkXStorage
      LIGHTRAG_VECTOR_STORAGE: NanoVectorDBStorage
      REDIS_URI: redis://redis:6379/1

      # Query defaults
      TOP_K: ${LIGHTRAG_TOP_K:-10}
      # Serialize LLM calls — single GPU
      MAX_ASYNC: "1"
      MAX_PARALLEL_INSERT: "2"

      # Cache — reduce repeated LLM calls during indexing
      ENABLE_LLM_CACHE: "true"
      ENABLE_LLM_CACHE_FOR_EXTRACT: "true"

      # Auth
      LIGHTRAG_API_KEY: ${LIGHTRAG_API_KEY:-}
    restart: unless-stopped

  # --- IRC Web Client (The Lounge) ---

  lounge:
    image: thelounge/thelounge:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - lounge_data:/var/opt/thelounge
      - ./config/thelounge:/var/opt/thelounge/config-seed:ro
    ports:
      - "${LOUNGE_PORT:-9000}:9000"
    restart: unless-stopped
    entrypoint: >
      sh -c '
        if [ ! -f /var/opt/thelounge/config.js ]; then
          cp /var/opt/thelounge/config-seed/config.js /var/opt/thelounge/config.js 2>/dev/null || true;
        fi;
        if [ ! -f /var/opt/thelounge/users/fleet.json ]; then
          mkdir -p /var/opt/thelounge/users;
          cp /var/opt/thelounge/config-seed/fleet.json /var/opt/thelounge/users/fleet.json 2>/dev/null || true;
        fi;
        exec thelounge start
      '

volumes:
  postgres_data:
  lounge_data:
  lightrag_storage:
  tei_models: