# ─── Hook Deployment Notes ────────────────────────────────────────────
#
# Hooks are written to .claude/settings.json per agent workspace.
# The settings file structure:
#
# {
#   "permissions": { "allow": [...], "deny": [...] },
#   "hooks": {
#     "PreToolUse": [
#       {
#         "matcher": "fleet_commit",
#         "hooks": [
#           {
#             "type": "command",
#             "command": "..."
#           }
#         ]
#       }
#     ],
#     "PostToolUse": [...]
#   }
# }
#
# Note: Claude Code hooks use a nested structure —
# each matcher has a list of hooks under it.
