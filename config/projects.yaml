# Projects the fleet can operate on.
# Cloned to projects/<name>/ on first use.
# Paths are resolved relative to the fleet directory at runtime.

projects:
  openclaw-fleet:
    description: The fleet itself (this repo)
    local: true  # no clone needed, it's the fleet dir

  aicp:
    description: AI Control Platform
    repo: https://github.com/cyberpunk042/devops-expert-local-ai

  ocf-tag:
    description: The Accountability Generator
    local: true  # lives inside this repo at agents/accountability-generator/

  nnrt:
    description: Narrative-to-Neutral Report Transformer
    repo: https://github.com/cyberpunk042/Narrative-to-Neutral-Report-Transformer

  dspd:
    description: DevOps Solution Product Development — project management surface via Plane
    repo: https://github.com/cyberpunk042/devops-solution-product-development