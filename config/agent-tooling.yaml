# Agent Tooling — Per-role MCP servers, plugins, skills
#
# This config drives:
#   scripts/setup-agent-tools.sh  — deploy per-agent mcp.json
#   scripts/install-plugins.sh    — install per-agent plugins
#   scripts/setup-claude-mem.sh   — deploy per-agent memory
#   scripts/setup-lightrag.sh     — knowledge graph setup
#
# MCP servers: command-based (fleet, lightrag) or npx-based (filesystem, github, etc)
# Plugins: installed via claude plugin install
# Skills: assigned from .claude/skills/ per role
# System tools: expected to be available on the system

defaults:
  mcp_servers:
    - name: fleet
      command: "{{FLEET_VENV}}/bin/python"
      args: ["-m", "fleet.mcp.server"]
      env:
        FLEET_DIR: "{{FLEET_DIR}}"
        FLEET_AGENT: "{{AGENT_NAME}}"
    # lightrag: CONDITIONAL — only when LocalAI is running.
    # Not in defaults because it fails when LocalAI is unavailable,
    # potentially blocking other MCP servers from loading.
    # To enable: add to specific agents that need RAG access when LocalAI is active.
    # - name: lightrag
    #   command: "python"
    #   args: ["-m", "daniel_lightrag_mcp"]
    #   env:
    #     LIGHTRAG_BASE_URL: "http://localhost:9621"
    #     LIGHTRAG_API_KEY: ""
  plugins:
    - claude-mem          # cross-session memory (SQLite-only mode for WSL2)
    - safety-net          # PreToolUse hook catches destructive commands
  skills:
    - fleet-communicate   # ALL agents: communication surface guide (IRC/ntfy/board/Plane)
  sub_agents:
    - code-explorer       # ALL agents: read-only codebase navigation

agents:
  architect:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins:
      - context7              # library/framework documentation
      - superpowers           # TDD, writing-plans, brainstorming, systematic-debugging (132K stars)
      - adversarial-spec      # multi-LLM debate for spec refinement (518 stars)
      - skill-creator         # create/improve/eval SKILL.md files (Phase D enabler)
      - claude-code-setup     # codebase analysis, recommend automations
    sub_agents:
      - pattern-analyzer      # architecture patterns, anti-patterns, coupling
      - dependency-mapper     # import graphs, circular deps, change impact
    skills:
      - architecture-propose
      - architecture-review
      - scaffold
      - feature-plan
      - refactor-architecture

  software-engineer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: playwright
        package: "@playwright/mcp@latest"
      # pytest-mcp: NO working MCP server package exists on PyPI.
      # pytest-mcp (pip) = mcp_eval test framework, NOT an MCP server.
      # Agents run pytest directly via Bash tool.
      # Re-enable when a real pytest MCP server is available.
      # - name: pytest-mcp
      #   command: "python"
      #   args: ["-m", "pytest_mcp_server"]
    plugins:
      - context7
      - superpowers           # TDD, systematic-debugging, verification (132K stars)
      - pyright-lsp           # Python type error detection
      - skill-creator         # create/improve/eval SKILL.md files
    sub_agents:
      - test-runner           # run tests, structured results
    skills:
      - feature-implement
      - feature-plan
      - feature-test
      - refactor-extract
      - refactor-split
      - foundation-deps
      - quality-lint

  qa-engineer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: playwright
        package: "@playwright/mcp@latest"
      # pytest-mcp: NO working MCP server package exists on PyPI.
      # See software-engineer section for details.
      # - name: pytest-mcp
      #   command: "python"
      #   args: ["-m", "pytest_mcp_server"]
    plugins:
      - superpowers           # TDD, systematic-debugging (132K stars)
    sub_agents:
      - test-runner           # run tests, structured results
      - regression-checker    # targeted regression after changes
      - coverage-analyzer     # coverage gaps, uncovered paths
    skills:
      - quality-coverage
      - quality-audit
      - quality-lint
      - quality-debt
      - foundation-testing
      - feature-test
      - feature-review
      - fleet-test

  devops:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: docker
        package: "@hypnosis/docker-mcp-server"
        # Community Docker MCP server (universal, 1.4.1)
        # Original @modelcontextprotocol/server-docker not in npm registry
      - name: github-actions
        package: "github-actions-mcp"
        # Correct package name (1.0.1) — original name was wrong
    plugins:
      - hookify               # natural-language hook creation (official Anthropic)
      - commit-commands        # git commit workflows (official Anthropic)
      - claude-code-setup     # codebase analysis, recommend automations
    sub_agents:
      - container-inspector   # Docker health, config audit, resource usage
    skills:
      - foundation-docker
      - foundation-ci
      - foundation-config
      - ops-deploy
      - ops-rollback
      - ops-incident
      - ops-backup
      - ops-maintenance
      - config-deploy
      - infra-monitoring

  devsecops-expert:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: docker
        package: "@modelcontextprotocol/server-docker"
      - name: semgrep
        command: "semgrep"
        args: ["--mcp"]
        # Semgrep: 30+ languages, custom rules, free tier. Most flexible security scanner.
    plugins:
      - security-guidance      # 9 security patterns via hooks (official Anthropic)
      - sage                   # Agent Detection and Response — ADR (162 stars)
    sub_agents:
      - dependency-scanner    # vulnerability scanning (pip audit, npm audit, semgrep)
      - secret-detector       # leaked credentials, secret patterns, git history
      - security-auditor      # full OWASP-based security audit
    skills:
      - infra-security
      - quality-audit
      - config-secrets
      - foundation-auth
      - fleet-security-audit

  fleet-ops:
    mcp_servers:
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins:
      - pr-review-toolkit      # 5 parallel Sonnet review agents (official Anthropic)
      - claude-md-management   # CLAUDE.md quality audit, learning capture
    sub_agents:
      - trail-reconstructor   # audit trail reconstruction (haiku, lightweight)
    skills:
      - pm-assess
      - quality-audit
      - fleet-review
      - openclaw-health
      - openclaw-fleet-status
      - openclaw-setup
      - openclaw-add-agent
      - scaffold-subagent

  project-manager:
    mcp_servers:
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: plane
        package: "@makeplane/plane-mcp-server"
        # Official Plane MCP (0.1.5): issues, cycles, modules.
    plugins:
      - plannotator            # visual plan/diff annotation, team feedback (4K stars)
    sub_agents:
      - sprint-analyzer       # sprint data aggregation, velocity, blockers
    skills:
      - pm-plan
      - pm-assess
      - pm-status-report
      - pm-retrospective
      - pm-changelog
      - pm-handoff
      - idea-capture
      - feature-plan
      - fleet-plan
      - fleet-sprint
      - fleet-plane

  technical-writer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins:
      - context7              # library/framework documentation for accurate writing
      - ars-contexta          # knowledge systems from conversation (3K stars)
      - elements-of-style     # 18 Strunk writing rules for documentation quality
    skills:
      - feature-document
      - pm-changelog
      - pm-handoff
      - quality-debt

  ux-designer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: playwright
        package: "@playwright/mcp@latest"
    plugins: []
    skills:
      - quality-accessibility

  accountability-generator:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
    plugins:
      - claude-md-management   # CLAUDE.md quality audit for compliance
    sub_agents:
      - trail-reconstructor   # audit trail reconstruction (shared with fleet-ops)
    skills:
      - quality-audit
      - quality-debt
      - quality-coverage
      - pm-status-report
