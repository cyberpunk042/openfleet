# Agent Tooling — Per-role MCP servers, plugins, skills
#
# This config drives scripts/setup-agent-tools.sh
# Each agent gets role-specific tools installed via IaC.
#
# MCP servers: installed via npx, configured in per-agent mcp.json
# Plugins: installed via claude plugin install
# Skills: assigned from skill-assignments.yaml + custom per role
# System tools: expected to be available on the system

defaults:
  mcp_servers:
    - name: fleet
      command: "{{FLEET_VENV}}/bin/python"
      args: ["-m", "fleet.mcp.server"]
      env:
        FLEET_DIR: "{{FLEET_DIR}}"
        FLEET_AGENT: "{{AGENT_NAME}}"
  plugins:
    - claude-mem          # cross-session memory — github.com/thedotmack/claude-mem
                          # SQLite-only mode recommended for WSL2 (avoids ChromaDB spawn storms)
  skills:
    - fleet-communicate   # ALL agents: communication surface guide (IRC/ntfy/board/Plane)

agents:
  architect:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins:
      - context7          # library/framework documentation
    skills:
      - architecture-propose
      - architecture-review
      - scaffold
      - feature-plan          # plan changes for features
      - refactor-architecture # restructure project architecture

  software-engineer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: playwright
        package: "@playwright/mcp@latest"
    plugins:
      - context7
    skills:
      - feature-implement
      - feature-plan            # plan changes for features
      - feature-test            # write and run tests
      - refactor-extract
      - refactor-split          # split large modules
      - foundation-deps         # dependency management
      - quality-lint            # linting + fixes
      # note: /debug is Claude built-in, not a custom skill

  qa-engineer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: playwright
        package: "@playwright/mcp@latest"
    plugins: []
    skills:
      - quality-coverage
      - quality-audit
      - quality-lint            # linting as quality gate
      - quality-debt            # identify tech debt
      - foundation-testing
      - feature-test            # write and run tests
      - feature-review          # code review
      - fleet-test              # fleet: run + analyze test results for review

  devops:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
      - name: docker
        package: "@modelcontextprotocol/server-docker"
    plugins: []
    skills:
      - foundation-docker
      - foundation-ci
      - foundation-config       # configuration management
      - ops-deploy
      - ops-rollback            # rollback on failure
      - ops-incident            # incident response + RCA
      - ops-backup              # backup/restore procedures
      - ops-maintenance
      - config-deploy           # deployment configuration
      - infra-monitoring        # monitoring setup

  devsecops-expert:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: docker
        package: "@modelcontextprotocol/server-docker"
    plugins: []
    skills:
      - infra-security
      - quality-audit
      - config-secrets          # secret management + rotation
      - foundation-auth         # auth implementation review
      - fleet-security-audit    # fleet: security review (code, infra, supply chain)

  fleet-ops:
    mcp_servers:
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins: []
    skills:
      - pm-assess
      - quality-audit
      - fleet-review            # fleet: 7-step review checklist
      - openclaw-health         # fleet: OpenClaw health check
      - openclaw-fleet-status   # fleet: fleet operational status
      - openclaw-setup          # fleet: OpenClaw setup
      - openclaw-add-agent      # fleet: add agent to OpenClaw
      - scaffold-subagent       # create new agent in fleet

  project-manager:
    mcp_servers:
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins: []
    skills:
      - pm-plan
      - pm-assess               # project state assessment
      - pm-status-report
      - pm-retrospective
      - pm-changelog
      - pm-handoff              # handoff documentation
      - idea-capture            # structured idea capture
      - feature-plan            # feature change planning
      - fleet-plan              # fleet: break epic into sprint tasks
      - fleet-sprint            # fleet: sprint lifecycle management
      - fleet-plane             # fleet: Plane sprint management

  technical-writer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: github
        package: "@modelcontextprotocol/server-github"
    plugins: []
    skills:
      - feature-document
      - pm-changelog
      - pm-handoff
      - quality-debt            # identify documentation gaps

  ux-designer:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
      - name: playwright
        package: "@playwright/mcp@latest"
    plugins: []
    skills:
      - quality-accessibility

  accountability-generator:
    mcp_servers:
      - name: filesystem
        package: "@modelcontextprotocol/server-filesystem"
        args: ["{{WORKSPACE}}"]
    plugins: []
    skills:
      - quality-audit
      - quality-debt            # identify process/quality gaps
      - quality-coverage        # verify test coverage
      - pm-status-report        # generate compliance reports
