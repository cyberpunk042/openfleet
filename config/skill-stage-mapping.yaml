# Skill-Stage Mapping — which skills are recommended at each methodology stage
#
# This config drives TOOLS.md generation (Phase G) and context system
# skill recommendations. When an agent is at a given stage, their TOOLS.md
# and context tell them which skills to consider.
#
# Sources:
#   config/methodology.yaml (stages)
#   config/agent-tooling.yaml (per-role MCP/plugins/skills)
#   skills-and-plugins-ecosystem-research.md (ecosystem inventory)
#   tools-system-full-capability-map.md (plugin capability table)
#   strategic-agent-capabilities-research.md (sub-agents, thinking)
#
# Three skill layers:
#   generic   — all agents, regardless of role
#   role      — specific roles only
#   plugin    — from installed plugins (superpowers, pr-review-toolkit, etc.)
#
# Plugin skills only available to agents that have the plugin installed
# (see config/agent-tooling.yaml for plugin assignments).
#
# PO can modify this file to adjust stage recommendations.
# No code changes required — generation pipeline reads this.

# ─── Generic Skills (all agents) ──────────────────────────────────────
# These are recommended regardless of role. Stage determines WHEN.

generic:
  all_stages:
    recommended:
      - skill: fleet-methodology-guide
        source: workspace
        why: "Stage awareness — what's expected, what to do, what NOT to do"
      - skill: fleet-contribution
        source: workspace
        why: "Synergy system — how to produce and consume contributions"

  conversation:
    recommended:
      - skill: fleet-communicate
        source: workspace
        why: "Know which channel for what (IRC/ntfy/board/Plane)"
    plugin_recommended:
      - skill: brainstorming
        plugin: superpowers
        why: "Socratic exploration of problem space before committing to approach"
        note: "Mandatory before any creative work per superpowers design"

  analysis:
    recommended:
      - skill: fleet-urls
        source: gateway
        why: "Every file/task reference must be a clickable URL"
      - skill: fleet-comment
        source: gateway
        why: "Post structured analysis findings to task"
      - skill: fleet-gap
        source: gateway
        why: "Identify gaps between current state and requirements"
    plugin_recommended:
      - skill: systematic-debugging
        plugin: superpowers
        why: "4-phase root cause: hypothesis → evidence → fix → verify"
      - skill: brainstorming
        plugin: superpowers
        why: "Explore the problem space at analysis depth"

  investigation:
    recommended:
      - skill: fleet-report
        source: gateway
        why: "Structure investigation findings for PO review"
    plugin_recommended:
      - skill: brainstorming
        plugin: superpowers
        why: "Explore multiple approaches — not just the first one"
      - skill: dispatching-parallel-agents
        plugin: superpowers
        why: "Research multiple independent topics in parallel via sub-agents"
      - skill: systematic-debugging
        plugin: superpowers
        why: "Investigating existing behavior with evidence-based methodology"

  reasoning:
    recommended:
      - skill: fleet-plan
        source: workspace
        why: "Break down epics into sprint tasks with dependencies"
      - skill: fleet-task-create
        source: gateway
        why: "Create subtasks with all fields set"
      - skill: fleet-task-update
        source: gateway
        why: "Update task metadata as plan develops"
    plugin_recommended:
      - skill: writing-plans
        plugin: superpowers
        why: "Detailed implementation roadmap with bite-sized tasks"

  work:
    recommended:
      - skill: fleet-commit
        source: gateway
        why: "Conventional commits with task reference"
      - skill: fleet-pr
        source: gateway
        why: "Publication-quality PRs with changelog and URLs"
      - skill: fleet-comment
        source: gateway
        why: "Structured completion/progress comments"
      - skill: fleet-memory
        source: gateway
        why: "Post decisions, alerts, knowledge to board memory"
      - skill: fleet-urls
        source: gateway
        why: "All references must be clickable links"
      - skill: fleet-alert
        source: gateway
        why: "Raise alerts for security/quality/architecture issues found during work"
      - skill: fleet-completion-checklist
        source: workspace
        why: "8-point pre-completion verification before calling fleet_task_complete"
    plugin_recommended:
      - skill: verification-before-completion
        plugin: superpowers
        why: "Run verification commands before ANY success claims"
      - skill: executing-plans
        plugin: superpowers
        why: "Batch execution of plan steps with checkpoints"
      - skill: test-driven-development
        plugin: superpowers
        why: "RED-GREEN-REFACTOR cycle with anti-patterns reference"

