# ─── Plugins to Evaluate ─────────────────────────────────────────────
# From research (skills-and-plugins-ecosystem-research.md §NOT YET ASSIGNED).
# These are NOT installed. Evaluate and assign in Phase D.

evaluate:
  high_priority:
    - plugin: feature-dev
      potential_agents: [architect, software-engineer]
      what: "3 sub-agents: code-explorer (sonnet), code-architect (sonnet), code-reviewer (sonnet)"
      stage: [analysis, reasoning, work]

    - plugin: code-review
      potential_agents: [fleet-ops, qa-engineer]
      what: "Automated code review with confidence-based scoring, multiple specialized agents"
      stage: work

    - plugin: skill-creator
      potential_agents: [architect, software-engineer]
      what: "Create, improve, eval, benchmark skills at scale — essential for building fleet skills"
      stage: all

    - plugin: claude-code-setup
      potential_agents: [all]
      what: "Analyze codebase, recommend automations (hooks, skills, MCP, subagents)"
      stage: analysis

    - plugin: claude-md-management
      potential_agents: [all]
      what: "CLAUDE.md quality audit, capture learnings, maintain memory"
      stage: all

  medium_priority:
    - plugin: episodic-memory
      potential_agents: [all]
      what: "Semantic search over past conversations — cross-session continuity"
      stage: all
      note: "Complements claude-mem"

    - plugin: double-shot-latte
      potential_agents: [all]
      what: "Auto-continuation — stops 'Would you like me to continue?' waste"
      stage: all
      note: "Could reduce wasted heartbeat cycles"

    - plugin: elements-of-style
      potential_agents: [technical-writer]
      what: "18 Strunk writing rules for documentation quality"
      stage: work

    - plugin: serena
      potential_agents: [architect, software-engineer]
      what: "Semantic code analysis via LSP — deeper than grep"
      stage: [analysis, investigation]

    - plugin: frontend-design
      potential_agents: [ux-designer, software-engineer]
      what: "Production-grade frontend design avoiding AI slop"
      stage: work

  low_priority:
    - plugin: claude-session-driver
      potential_agents: [fleet-ops]
      what: "Launch, control, monitor other Claude Code sessions via tmux"
      note: "Could enable fleet orchestrator to manage sessions"

    - plugin: superpowers-chrome
      potential_agents: [software-engineer, qa-engineer]
      what: "Direct Chrome DevTools Protocol access, 17 CLI commands"
      stage: work

# ─── Stage Restrictions ───────────────────────────────────────────────
# Skills that should NOT be used at certain stages.
# Complements methodology.yaml tools_blocked (MCP-level structural enforcement).
# Skill restrictions are advisory — enforced by directives in TOOLS.md,
# not structurally by the MCP layer.

restrictions:
  conversation:
    blocked_skills:
      - fleet-commit
      - fleet-pr
      - test-driven-development
      - executing-plans
      - subagent-driven-development
      - using-git-worktrees
      - finishing-a-development-branch
      - requesting-code-review
      - receiving-code-review
    reason: "Conversation is for understanding, not building"

  analysis:
    blocked_skills:
      - fleet-pr
      - executing-plans
      - writing-plans
      - subagent-driven-development
      - requesting-code-review
    reason: "Analysis examines what exists, not what to build"

  investigation:
    blocked_skills:
      - fleet-pr
      - fleet-commit
      - executing-plans
      - test-driven-development
      - subagent-driven-development
    reason: "Investigation researches options, not implements them"

  reasoning:
    blocked_skills:
      - fleet-pr
      - executing-plans
      - test-driven-development
    reason: "Reasoning plans the approach — execute after PO confirms"
