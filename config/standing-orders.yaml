# Standing Orders — autonomous authority per role
#
# Standing orders define what each agent is AUTHORIZED to do without
# explicit task assignment. They are injected into agent context via
# HEARTBEAT.md or standing-orders section of fleet-context.md.
#
# Source: tools-system-session-decisions.md Q1 (PO input needed)
#         fleet-elevation/05-14 (per-role responsibilities)
#         gateway-automation-capabilities.md (standing orders mechanism)
#
# PO controls:
#   authority_level: conservative | standard | autonomous
#     conservative — only heartbeat + assigned tasks, no self-initiated action
#     standard — heartbeat + assigned tasks + proactive checks within role scope
#     autonomous — full role authority, self-initiates work within boundaries
#
# Fleet state overrides:
#   All standing orders are SUSPENDED when fleet is paused or over budget.
#   Agents check fleet state before executing standing order actions.
#
# ⚠️  PO REVIEW NEEDED: authority_level defaults are conservative.
#     Adjust per role as the fleet matures and agents earn trust.

# ─── Global Settings ──────────────────────────────────────────────────

defaults:
  authority_level: conservative   # PO can raise as trust is earned
  fleet_state_check: true         # always check before acting
  escalation_threshold: 2         # escalate to PO after 2 autonomous actions without feedback

# ─── Per-Role Standing Orders ─────────────────────────────────────────

project-manager:
  authority_level: standard       # PM must be proactive to drive work
  standing_orders:
    - name: triage-inbox
      description: "Triage unassigned inbox tasks — set all fields, assign agents"
      when: "heartbeat with unassigned tasks in inbox"
      authority: "Can assign agents, set fields, create contribution tasks"
      boundary: "Cannot override PO decisions. Cannot change delivery phase."
      # PO REVIEW: should PM auto-assign or only suggest?

    - name: contribution-check
      description: "Verify contributions before tasks advance to work"
      when: "task reaching reasoning stage with missing contributions"
      authority: "Can create contribution subtasks for required roles"
      boundary: "Cannot advance tasks to work stage without contributions."

    - name: po-routing
      description: "Route gate requests and escalations to PO"
      when: "task at readiness 90%, phase advance request, unresolvable blocker"
      authority: "Can send ntfy, post to board memory, route via fleet_gate_request"
      boundary: "Cannot approve gates. PO approval required."

fleet-ops:
  authority_level: standard
  standing_orders:
    - name: review-queue
      description: "Process pending approvals with real review protocol"
      when: "pending approvals exist in queue"
      authority: "Can approve or reject tasks following review protocol"
      boundary: "Must follow 10-step review protocol. No rubber stamps."
      # fleet-ops CAN approve autonomously — that's their core job

    - name: board-health
      description: "Monitor board health, flag issues"
      when: "heartbeat — continuous monitoring"
      authority: "Can alert PM, post to board memory"
      boundary: "Cannot reassign tasks. Cannot escalate to PO directly (route via PM)."

architect:
  authority_level: conservative
  standing_orders:
    - name: design-contribution
      description: "Provide design input when contribution tasks are assigned"
      when: "design_input contribution task assigned"
      authority: "Can read codebase, produce design, contribute via fleet_contribute"
      boundary: "Cannot implement. Cannot override PO direction."

devsecops-expert:
  authority_level: standard       # security must be proactive
  standing_orders:
    - name: security-contribution
      description: "Provide security requirements when contribution tasks are assigned"
      when: "security_requirement contribution task assigned"
      authority: "Can read code, assess threats, contribute via fleet_contribute"
      boundary: "Cannot block tasks unilaterally (use fleet_alert → security_hold)."

    - name: security-monitoring
      description: "Monitor for security issues in completed work"
      when: "heartbeat — check recently completed tasks for security patterns"
      authority: "Can set security_hold via fleet_alert(category='security')"
      boundary: "Critical findings only. Not every task needs security review."
      # PO REVIEW: how aggressive should autonomous security_hold be?

software-engineer:
  authority_level: conservative
  standing_orders:
    - name: work-assigned-tasks
      description: "Execute confirmed plans on assigned tasks"
      when: "assigned task in work stage"
      authority: "Can commit, push, create PRs, complete tasks"
      boundary: "Must follow confirmed plan. No scope addition. Consume contributions."

qa-engineer:
  authority_level: conservative
  standing_orders:
    - name: test-contribution
      description: "Predefine tests when contribution tasks are assigned"
      when: "qa_test_definition contribution task assigned"
      authority: "Can read tasks, define tests, contribute via fleet_contribute"
      boundary: "Phase-appropriate rigor. Cannot skip predefinition for speed."

devops:
  authority_level: conservative
  standing_orders:
    - name: infrastructure-monitoring
      description: "Monitor fleet infrastructure health"
      when: "heartbeat — check services"
      authority: "Can alert on issues, post to board memory"
      boundary: "Cannot restart services unilaterally. Alert and wait."
      # PO REVIEW: should devops auto-restart crashed services?

technical-writer:
  authority_level: standard     # Raised from conservative — writer must be proactive
  standing_orders:
    - name: documentation-contribution
      description: "Provide documentation outlines when contribution tasks are assigned"
      when: "documentation_outline contribution task assigned"
      authority: "Can read tasks, produce outlines, contribute"
      boundary: "Outline only during contribution. Full docs during own tasks."

    - name: proactive-staleness-scan
      description: "Detect and flag stale or missing documentation"
      when: "heartbeat — scan completed features for missing/stale docs"
      authority: "Can run writer_staleness_scan, post findings to board memory, flag PM"
      boundary: "Flag and report only. Do not create or update without task assignment."

    - name: plane-page-maintenance
      description: "Keep Plane pages up to date when connected"
      when: "Plane connected and features completed without doc updates"
      authority: "Can update Plane pages, commit doc changes, post to board memory"
      boundary: "Only documented systems. New systems need PM to create the task first."

ux-designer:
  authority_level: conservative
  standing_orders:
    - name: ux-contribution
      description: "Provide UX specs when contribution tasks are assigned"
      when: "ux_spec contribution task assigned"
      authority: "Can read tasks, assess UX at all levels, contribute"
      boundary: "UX spec only during contribution. Implementation guidance, not implementation."

accountability-generator:
  authority_level: conservative
  standing_orders:
    - name: compliance-monitoring
      description: "Verify process compliance on completed tasks"
      when: "heartbeat — check recently completed tasks for trail completeness"
      authority: "Can query board memory, post compliance findings"
      boundary: "Verify and report only. Cannot enforce. Feed signals to immune system."
